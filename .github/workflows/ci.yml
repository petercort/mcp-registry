name: Build and Test MCP Registry

on:
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Type check
      run: npm run type-check

    - name: Build static site
      run: npm run build:static

    - name: Test static site build
      run: |
        # Check that required files exist
        ls -la dist/
        test -f dist/index.html || exit 1
        test -f dist/api.js || exit 1
        test -f dist/api-test.html || exit 1
        test -d dist/data/servers || exit 1
        
        # Check that data files are present
        ls dist/data/servers/*.json | wc -l | grep -q [1-9] || exit 1

    - name: Test with Python server
      run: |
        cd dist
        # Start server in background
        python3 -m http.server 8000 &
        SERVER_PID=$!
        
        # Wait for server to start
        sleep 3
        
        # Test that pages load
        curl -f http://localhost:8000/ || exit 1
        curl -f http://localhost:8000/api-test.html || exit 1
        curl -f http://localhost:8000/data/servers/arxiv-mcp-server.json || exit 1
        
        # Stop server
        kill $SERVER_PID

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: static-site-${{ matrix.node-version }}
        path: dist/